<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLA-C01 Practice Quiz</title>
  <link rel="stylesheet" href="assets/site.css" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #ff9900;
      --accent2: #232f3e;
      --ok: #1d8a5e;
      --bad: #c44c4c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      background: var(--accent2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-h, 3.25rem);
      z-index: 9;
    }
    select, button {
      font: inherit;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    button.primary { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    main { max-width: 820px; margin: 0 auto; padding: 1.5rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--accent2);
      border: 1px solid var(--border);
    }
    .badge.domain { border-color: var(--accent); color: var(--accent); }
    .stem { font-size: 1.05rem; margin-bottom: 1rem; }
    .options { display: flex; flex-direction: column; gap: 0.5rem; }
    .opt {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:hover { border-color: var(--accent); }
    .opt.selected { border-color: var(--accent); background: rgba(255,153,0,0.12); }
    .opt.correct { border-color: var(--ok); background: rgba(29,138,94,0.15); }
    .opt.incorrect { border-color: var(--bad); background: rgba(196,76,76,0.12); }
    .opt input { margin-top: 0.2rem; accent-color: var(--accent); }
    .order-list { list-style: none; padding: 0; margin: 0; }
    .order-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.4rem;
      background: var(--bg);
    }
    .match-row { margin-bottom: 0.75rem; }
    .match-row label { display: block; margin-bottom: 0.25rem; color: var(--muted); font-size: 0.9rem; }
    .match-row select { width: 100%; }
    .feedback {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok { border-color: var(--ok); }
    .feedback.bad { border-color: var(--bad); }
    .feedback h4 { margin: 0 0 0.5rem; }
    .wrong-why { margin: 0.5rem 0 0; padding-left: 1rem; color: var(--muted); font-size: 0.9rem; }
    .nav { display: flex; justify-content: space-between; margin-top: 1rem; gap: 0.5rem; }
    .progress { height: 6px; background: var(--border); border-radius: 3px; margin: 0.5rem 0; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); transition: width 0.2s; }
    .hidden { display: none !important; }
    #start-screen, #results-screen { text-align: center; padding: 2rem 1rem; }
    #results-screen h2 { color: var(--accent); }
    .score-big { font-size: 2.5rem; font-weight: 700; margin: 0.5rem 0; }
    .timer { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header class="site-header" style="border-bottom-width:2px">
    <a href="index.html" class="site-logo" style="flex:0">← Hub</a>
    <div style="flex:1;min-width:0">
      <h1 style="margin:0;font-size:1rem">Practice Quiz</h1>
      <p style="margin:0.2rem 0 0;color:var(--muted);font-size:0.8rem">120 Q · MC · multi-select · ordering</p>
    </div>
    <a href="learn.html?doc=06-cheat-sheet-last-24h.md" class="btn btn-sm">Cheat sheet</a>
  </header>
  <div class="toolbar" id="header-tools" style="display:none;max-width:820px;margin:0 auto;padding:0.5rem 1rem;gap:0.75rem;flex-wrap:wrap;align-items:center">
    <span class="timer" id="timer"></span>
    <span id="counter"></span>
    <div class="progress" style="flex:1;min-width:120px"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
  <main>
    <div id="start-screen" class="card">
      <h2>Start practice</h2>
      <p>All <strong>120</strong> questions from the study pack are included.</p>
      <div style="display:flex;flex-direction:column;gap:0.75rem;max-width:320px;margin:1rem auto;text-align:left">
        <label>Mode
          <select id="mode-select" style="width:100%;margin-top:0.25rem">
            <option value="all">All 120 questions</option>
            <option value="exam">Exam simulation (65 random)</option>
            <option value="domain">By domain</option>
          </select>
        </label>
        <label id="domain-wrap" class="hidden">Domain
          <select id="domain-select" style="width:100%;margin-top:0.25rem">
            <option value="D1">D1 — Data Preparation</option>
            <option value="D2">D2 — Model Development</option>
            <option value="D3">D3 — Deployment</option>
            <option value="D4">D4 — Monitoring & Security</option>
            <option value="Cross">Cross / Exam meta</option>
          </select>
        </label>
        <label><input type="checkbox" id="timed-check" /> Timed mode (130 min for 65 Q, scaled for other counts)</label>
        <label><input type="checkbox" id="shuffle-check" checked /> Shuffle question order</label>
      </div>
      <button class="primary" id="start-btn">Start quiz</button>
    </div>
    <div id="quiz-screen" class="hidden">
      <div class="card" id="question-card"></div>
      <div class="nav">
        <button id="prev-btn">Previous</button>
        <button class="primary" id="check-btn">Check answer</button>
        <button id="next-btn" class="hidden">Next</button>
        <button id="finish-btn" class="hidden primary">See results</button>
      </div>
    </div>
    <div id="results-screen" class="hidden card">
      <h2>Results</h2>
      <div class="score-big" id="final-score"></div>
      <p id="final-detail"></p>
      <button class="primary" id="retry-btn">Try again</button>
      <button id="review-btn">Review incorrect</button>
    </div>
  </main>
  <script>
    const ALL_QUESTIONS = [{"id": 1, "domain": "D1", "type": "single", "stem": "A fintech stores 5 TB of transaction data in S3 as CSV. Training jobs read the same columns repeatedly. What is the MOST cost-effective format change to improve training I/O?", "options": {"A": "Convert to JSON lines", "B": "Convert to Apache Parquet", "C": "Store as Avro only in Kinesis", "D": "Duplicate data in DynamoDB"}, "correct": ["B"], "explanation": "Parquet is columnar and compressed, reducing scan cost and SageMaker training time for tabular ML.", "wrongWhy": {"A": "JSON is row-oriented and verbose for analytics.", "C": "Avro is valid but Parquet dominates S3 analytics ML.", "D": "DynamoDB wrong for bulk training scans."}}, {"id": 2, "domain": "D1", "type": "multi", "stem": "A company needs low-latency feature retrieval at inference AND batch features for nightly retraining. Which TWO capabilities should they implement? (Select TWO)", "options": {"A": "SageMaker Feature Store online store for real-time inference lookups", "B": "Amazon Athena as the sole feature serving layer", "C": "Amazon Kinesis Data Firehose to replace feature storage", "D": "SageMaker Feature Store offline store for batch training pipelines", "E": "AWS Glue DataBrew only, with no feature persistence layer"}, "correct": ["A", "D"], "explanation": "Feature Store online + offline stores give consistent features for inference and batch retraining—the canonical exam pattern.", "wrongWhy": {"B": "Athena queries data but is not a feature serving layer.", "C": "Firehose ingests streams, not feature management.", "E": "DataBrew prepares data but not serve features at inference."}}, {"id": 3, "domain": "D1", "type": "single", "stem": "A team must visually profile, clean, and transform data without writing Spark code. Which service should they choose?", "options": {"A": "AWS Glue DataBrew", "B": "AWS Batch", "C": "Amazon EMR only", "D": "AWS Lambda exclusively"}, "correct": ["A"], "explanation": "DataBrew is the visual data preparation service.", "wrongWhy": {"B": "Batch runs jobs but no visual prep.", "C": "EMR needs Spark coding.", "D": "Lambda limited for large transforms."}}, {"id": 4, "domain": "D1", "type": "single", "stem": "Before training a credit model, engineers must detect if one demographic has disproportionately fewer positive labels. Which metric/tool pair is appropriate?", "options": {"A": "RMSE with Debugger", "B": "Difference in Proportions of Labels (DPL) with SageMaker Clarify", "C": "ROC-AUC with Model Monitor", "D": "RMSE with Ground Truth"}, "correct": ["B"], "explanation": "DPL is a pre-training bias metric; Clarify detects label proportion bias.", "wrongWhy": {"A": "RMSE is regression metric.", "C": "Model Monitor is post-deployment.", "D": "Ground Truth labels data."}}, {"id": 5, "domain": "D1", "type": "single", "stem": "Real-time clickstream events must be ingested for feature computation with custom consumers. Which service?", "options": {"A": "Kinesis Data Firehose", "B": "Kinesis Data Streams", "C": "AWS DataSync", "D": "Amazon SQS only"}, "correct": ["B"], "explanation": "Streams allows custom real-time consumers; Firehose is fully managed delivery.", "wrongWhy": {"A": "Firehose not for custom consumer logic.", "C": "DataSync is migration.", "D": "SQS not primary stream ingest."}}, {"id": 6, "domain": "D1", "type": "single", "stem": "A healthcare company must identify PHI in S3 buckets automatically. Which service?", "options": {"A": "AWS Macie", "B": "Amazon Rekognition", "C": "AWS WAF", "D": "Amazon GuardDuty"}, "correct": ["A"], "explanation": "Macie discovers sensitive data including PII/PHI patterns in S3.", "wrongWhy": {"B": "Rekognition is vision.", "C": "WAF protects web apps.", "D": "GuardDuty is threat detection."}}, {"id": 7, "domain": "D1", "type": "ordering", "stem": "A team prepares raw CSV data in Amazon S3 for SageMaker training. Place the steps in the correct order.", "options": {"1": "Register features in SageMaker Feature Store", "2": "Ingest and validate schema", "3": "Split into train/validation/test sets", "4": "Transform data and engineer features"}, "correct": ["2", "4", "3", "1"], "explanation": "Ingest and validate first, then transform, split, and optionally register features for reuse.", "wrongWhy": {}}, {"id": 8, "domain": "D1", "type": "single", "stem": "A labeling project needs human annotators with workflow quality control for image bounding boxes. Best choice?", "options": {"A": "SageMaker Ground Truth", "B": "Amazon Polly", "C": "Amazon Translate", "D": "AWS CloudFormation"}, "correct": ["A"], "explanation": "Ground Truth manages labeling workflows at scale.", "wrongWhy": {"B": "Polly is text-to-speech.", "C": "Translate is language.", "D": "CloudFormation is IaC."}}, {"id": 9, "domain": "D1", "type": "single", "stem": "Class imbalance causes poor recall on minority class. Which approach is MOST appropriate?", "options": {"A": "Use accuracy as sole metric", "B": "Apply stratified sampling and consider oversampling/SMOTE-class techniques", "C": "Remove minority class", "D": "Disable validation"}, "correct": ["B"], "explanation": "Stratified splits and resampling address imbalance; accuracy alone misleads.", "wrongWhy": {"A": "Accuracy misleading.", "C": "Removes critical class.", "D": "Validation required."}}, {"id": 10, "domain": "D1", "type": "single", "stem": "Training data must be mounted with POSIX semantics across multiple training instances. Which storage?", "options": {"A": "Amazon S3 standard", "B": "Amazon EFS", "C": "Amazon Glacier", "D": "AWS Snowball Edge only"}, "correct": ["B"], "explanation": "EFS provides shared POSIX file system for multi-node training.", "wrongWhy": {"A": "S3 object not POSIX mount.", "C": "Glacier archival.", "D": "Snowball migration device."}}, {"id": 11, "domain": "D1", "type": "single", "stem": "Which service helps validate data quality rules in ML pipelines?", "options": {"A": "AWS Glue Data Quality", "B": "Amazon Macie", "C": "AWS CloudTrail", "D": "Amazon Rekognition"}, "correct": ["A"], "explanation": "Validating rules on datasets in pipelines", "wrongWhy": {"B": "Macie finds sensitive data, not pipeline quality rules.", "C": "CloudTrail audits API calls.", "D": "Rekognition is computer vision."}}, {"id": 12, "domain": "D1", "type": "single", "stem": "A team must combine batch data from Amazon RDS and Amazon S3 for ETL at scale. Best approach?", "options": {"A": "Amazon Athena only", "B": "AWS Glue or Amazon EMR with Spark", "C": "Amazon SNS", "D": "AWS Lambda only"}, "correct": ["B"], "explanation": "AWS Glue or EMR Spark", "wrongWhy": {"A": "Athena queries but does not orchestrate large multi-source ETL.", "C": "SNS is messaging.", "D": "Lambda alone is poor for large batch ETL."}}, {"id": 13, "domain": "D1", "type": "single", "stem": "ML model artifacts in S3 must use customer-managed encryption keys. What should you configure?", "options": {"A": "SSE-S3 only", "B": "Public bucket ACL", "C": "SSE-KMS with CMK", "D": "Disable encryption"}, "correct": ["C"], "explanation": "SSE-KMS", "wrongWhy": {"A": "SSE-S3 does not use customer-managed KMS CMK.", "B": "Public buckets violate security best practices.", "D": "Encryption required for compliance scenarios."}}, {"id": 14, "domain": "D1", "type": "multi", "stem": "Select TWO services suitable for streaming ETL into Amazon S3 (Select TWO).", "options": {"A": "Amazon Kinesis Data Firehose", "B": "Amazon S3 Glacier", "C": "Amazon Managed Service for Apache Flink", "D": "Amazon Route 53", "E": "AWS Snowball"}, "correct": ["A", "C"], "explanation": "Firehose delivers streams to S3; Managed Flink processes streams with stateful ETL.", "wrongWhy": {"B": "Glacier is archival.", "D": "Route 53 is DNS.", "E": "Snowball is offline migration."}}, {"id": 15, "domain": "D1", "type": "single", "stem": "A fraud model flags many uncertain predictions. How reduce labeling cost while keeping quality?", "options": {"A": "Delete all uncertain predictions", "B": "Train without labels", "C": "Disable model monitoring", "D": "Amazon Augmented AI (A2I) human review loops"}, "correct": ["D"], "explanation": "Amazon A2I human review loops", "wrongWhy": {"A": "Throws away valuable edge cases.", "B": "Supervised problems need labels.", "C": "Monitoring does not solve labeling."}}, {"id": 16, "domain": "D2", "type": "single", "stem": "A data scientist needs to run hundreds of training jobs to find optimal hyperparameters using Bayesian optimization. Which SageMaker capability should they use?", "options": {"A": "SageMaker Automatic Model Tuning (AMT)", "B": "SageMaker Autopilot", "C": "SageMaker Model Monitor", "D": "SageMaker Ground Truth"}, "correct": ["A"], "explanation": "AMT performs hyperparameter optimization with Bayesian search and early stopping.", "wrongWhy": {"B": "Autopilot automates end-to-end model building, not tuning your existing estimator.", "C": "Model Monitor watches production endpoints.", "D": "Ground Truth is for labeling data."}}, {"id": 17, "domain": "D2", "type": "single", "stem": "During training, loss stops improving and Debugger reports vanishing gradients. Which service helped detect this issue?", "options": {"A": "SageMaker Model Monitor", "B": "SageMaker Debugger", "C": "AWS CloudTrail", "D": "Amazon Macie"}, "correct": ["B"], "explanation": "Debugger captures tensors and applies rules for convergence problems.", "wrongWhy": {"A": "Model Monitor is for production inference.", "C": "CloudTrail logs API activity.", "D": "Macie finds sensitive data in S3."}}, {"id": 18, "domain": "D2", "type": "single", "stem": "A startup needs to detect objects in images via API without building custom CV models or managing training infrastructure. What should they use?", "options": {"A": "Train Image Classification built-in algorithm from scratch", "B": "Amazon SageMaker Data Wrangler", "C": "Amazon Rekognition", "D": "AWS Glue DataBrew"}, "correct": ["C"], "explanation": "Rekognition provides pre-built computer vision APIs.", "wrongWhy": {"A": "Requires ML expertise and training ops.", "B": "Data prep tool, not inference API.", "D": "Visual ETL, not image detection API."}}, {"id": 19, "domain": "D2", "type": "single", "stem": "An enterprise requires versioned model artifacts and manual approval before any model reaches production endpoints. Which feature addresses this?", "options": {"A": "SageMaker Experiments only", "B": "Amazon S3 versioning alone", "C": "AWS CodeDeploy", "D": "SageMaker Model Registry"}, "correct": ["D"], "explanation": "Model Registry tracks versions, metadata, and approval status for deployment governance.", "wrongWhy": {"A": "Experiments track trials but not formal approval workflow.", "B": "S3 versioning lacks ML approval workflow.", "C": "CodeDeploy deploys applications, not ML registry governance."}}, {"id": 20, "domain": "D2", "type": "single", "stem": "A fraud detection model has 0.5% positive class rate. Which evaluation metrics should the team prioritize?", "options": {"A": "F1 score, precision, and recall", "B": "Accuracy only", "C": "RMSE and MAE", "D": "R-squared"}, "correct": ["A"], "explanation": "Imbalanced classification requires precision/recall/F1, not accuracy alone.", "wrongWhy": {"B": "Accuracy is misleading with extreme imbalance.", "C": "Regression metrics for classification.", "D": "R-squared is for regression."}}, {"id": 21, "domain": "D2", "type": "multi", "stem": "A team needs foundation-model text generation with minimal ML infrastructure operations. Select TWO.", "options": {"A": "Train GPT from scratch on EC2", "B": "Amazon Bedrock", "C": "Amazon SageMaker JumpStart foundation models", "D": "AWS Snowcone", "E": "Amazon EBS snapshots"}, "correct": ["B", "C"], "explanation": "Bedrock and JumpStart provide FMs without building training clusters from scratch.", "wrongWhy": {"A": "High ops and cost.", "D": "Edge migration device.", "E": "Block storage snapshots unrelated."}}, {"id": 22, "domain": "D2", "type": "single", "stem": "A bank wants to evaluate a new fraud model against the current production model without sending the new model's predictions to customers. What deployment pattern should they use?", "options": {"A": "Replace production variant with 100% traffic immediately", "B": "Add a shadow variant that receives copied inference requests", "C": "Delete the production endpoint", "D": "Use Batch Transform only"}, "correct": ["B"], "explanation": "Shadow variants process duplicate traffic without affecting live responses.", "wrongWhy": {"A": "Immediate cutover risks customer impact.", "C": "Removes serving capability.", "D": "Batch is offline, not live A/B comparison."}}, {"id": 23, "domain": "D2", "type": "single", "stem": "A team must train a custom PyTorch model on SageMaker and deploy it with a custom inference container. Which approach is required?", "options": {"A": "SageMaker Autopilot only", "B": "Built-in Linear Learner algorithm", "C": "Script mode with training code and an ECR inference image", "D": "Amazon Bedrock fine-tuning only"}, "correct": ["C"], "explanation": "Script mode (BYO framework) plus ECR container is the standard custom model path.", "wrongWhy": {"A": "Autopilot does not support arbitrary custom PyTorch.", "B": "Linear Learner is tabular built-in.", "D": "Bedrock is for foundation models, not arbitrary PyTorch."}}, {"id": 24, "domain": "D2", "type": "single", "stem": "A data scientist needs strong performance on large tabular classification datasets with minimal algorithm tuning. Which SageMaker built-in algorithm is often appropriate?", "options": {"A": "BlazingText", "B": "Object Detection", "C": "Seq2Seq", "D": "XGBoost"}, "correct": ["D"], "explanation": "XGBoost is the common built-in choice for tabular classification/regression at scale.", "wrongWhy": {"A": "BlazingText is for text.", "B": "Object Detection is for images.", "C": "Seq2Seq is for sequence generation."}}, {"id": 25, "domain": "D2", "type": "single", "stem": "Regulators require explaining which input features most influenced individual predictions from a SageMaker endpoint. Which tool should be used?", "options": {"A": "SageMaker Clarify with SHAP explanations", "B": "AWS CloudTrail", "C": "Amazon Athena", "D": "AWS Cost Explorer"}, "correct": ["A"], "explanation": "Clarify provides SHAP-based feature attributions for explainability.", "wrongWhy": {"B": "Audit logs, not model explanations.", "C": "SQL query service.", "D": "Cost analysis tool."}}, {"id": 26, "domain": "D2", "type": "single", "stem": "A model shows excellent training accuracy but poor validation performance. Which actions are MOST appropriate to reduce overfitting?", "options": {"A": "Remove the validation set", "B": "Apply regularization and gather more representative validation data", "C": "Increase model complexity only", "D": "Disable early stopping"}, "correct": ["B"], "explanation": "Regularization and better validation data address overfitting.", "wrongWhy": {"A": "Validation is essential.", "C": "More complexity worsens overfitting.", "D": "Early stopping helps prevent overfitting."}}, {"id": 27, "domain": "D2", "type": "single", "stem": "A company must extract entities and key phrases from support tickets without training custom NLP models. Which service should they choose?", "options": {"A": "Amazon Comprehend", "B": "Amazon Rekognition", "C": "SageMaker Neo", "D": "Amazon Kinesis Data Streams"}, "correct": ["A"], "explanation": "Comprehend provides managed NLP entity and phrase extraction.", "wrongWhy": {"B": "Vision service.", "C": "Neo compiles models for edge.", "D": "Streaming ingestion."}}, {"id": 28, "domain": "D2", "type": "single", "stem": "What is the PRIMARY difference between SageMaker Autopilot and SageMaker Automatic Model Tuning (AMT)?", "options": {"A": "AMT only works with images", "B": "Autopilot requires manual endpoint creation only", "C": "They are identical services", "D": "Autopilot automates end-to-end model building; AMT tunes hyperparameters of your chosen estimator"}, "correct": ["D"], "explanation": "Autopilot is AutoML pipeline; AMT optimizes hyperparameters for an algorithm you specify.", "wrongWhy": {"A": "AMT works with many algorithms.", "B": "Autopilot can propose deployment steps.", "C": "Different purposes."}}, {"id": 29, "domain": "D3", "type": "single", "stem": "An application sends predictions sporadically (a few times per hour) and the team wants minimal instance fleet management with pay-per-inference pricing. Which deployment option is BEST?", "options": {"A": "SageMaker serverless inference", "B": "Real-time endpoint with 24/7 ml.g5.12xlarge instances", "C": "SageMaker Batch Transform on a schedule", "D": "Multi-AZ Amazon RDS"}, "correct": ["A"], "explanation": "Serverless inference scales to zero between requests and charges per invocation.", "wrongWhy": {"B": "Always-on instances are costly for sporadic traffic.", "C": "Batch is for bulk offline scoring, not interactive sporadic API calls.", "D": "RDS is a database, not model hosting."}}, {"id": 30, "domain": "D3", "type": "single", "stem": "A computer vision app uploads 100 GB image batches and can wait up to 24 hours for results using a queue-based pattern. Which inference approach fits BEST?", "options": {"A": "Real-time endpoint with auto scaling", "B": "Asynchronous SageMaker endpoint with S3 input/output", "C": "SageMaker serverless inference with 1 MB payload limit", "D": "Amazon API Gateway HTTP proxy only"}, "correct": ["B"], "explanation": "Async endpoints queue large payloads and write results to S3.", "wrongWhy": {"A": "Real-time is for low-latency steady traffic, not 100 GB batches.", "C": "Serverless has payload/memory limits.", "D": "API Gateway does not host models."}}, {"id": 31, "domain": "D3", "type": "single", "stem": "A retailer must score 10 million customer records nightly with no persistent inference endpoint. What should they use?", "options": {"A": "SageMaker real-time endpoint", "B": "Amazon Lex bot", "C": "SageMaker Batch Transform reading from and writing to S3", "D": "AWS Lambda with 15-minute timeout for each record individually"}, "correct": ["C"], "explanation": "Batch Transform processes large offline datasets without a standing endpoint.", "wrongWhy": {"A": "Real-time endpoints are for online inference.", "B": "Lex is conversational AI.", "D": "Lambda is not suited for bulk scoring millions of rows."}}, {"id": 32, "domain": "D3", "type": "single", "stem": "An MLOps team needs a native AWS DAG to chain data processing, training, evaluation, and conditional deployment steps with artifact caching. Which service should they use?", "options": {"A": "Amazon SNS", "B": "Amazon SQS", "C": "AWS Step Functions only without SageMaker integration", "D": "SageMaker Pipelines"}, "correct": ["D"], "explanation": "SageMaker Pipelines is the ML-native orchestration DAG on AWS.", "wrongWhy": {"A": "SNS is pub/sub notifications.", "B": "SQS is a message queue.", "C": "Step Functions can orchestrate but Pipelines is ML-first with step caching."}}, {"id": 33, "domain": "D3", "type": "single", "stem": "A team wants to shift a small percentage of live traffic to a new model variant before full rollout to limit blast radius. Which strategy matches this requirement?", "options": {"A": "Canary deployment with gradual traffic increase", "B": "Immediate blue/green cutover of 100% traffic day one", "C": "Delete the old model artifact from S3", "D": "Train a second model on unlabeled data only"}, "correct": ["A"], "explanation": "Canary gradually increases traffic to the new variant.", "wrongWhy": {"B": "Full immediate cutover is higher risk.", "C": "Deleting artifacts is not a traffic strategy.", "D": "Unlabeled-only training is unrelated."}}, {"id": 34, "domain": "D3", "type": "multi", "stem": "Select TWO resources commonly used to build and store container images for SageMaker custom inference (Select TWO).", "options": {"A": "Amazon ECR", "B": "AWS CodeBuild", "C": "Amazon S3 Glacier only", "D":     let deck = [];
    let index = 0;
    let answers = {};
    let checked = {};
    let timerId = null;
    let timeLeft = 0;
    let reviewMode = false;

    const modeSelect = document.getElementById('mode-select');
    const domainWrap = document.getElementById('domain-wrap');
    modeSelect.addEventListener('change', () => {
      domainWrap.classList.toggle('hidden', modeSelect.value !== 'domain');
    });

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildDeck() {
      const mode = modeSelect.value;
      let list = [...ALL_QUESTIONS];
      if (mode === 'domain') {
        const d = document.getElementById('domain-select').value;
        list = list.filter(q => q.domain === d);
      } else if (mode === 'exam') {
        list = shuffle(list).slice(0, 65);
      }
      if (document.getElementById('shuffle-check').checked) list = shuffle(list);
      return list;
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60), s = sec % 60;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function startTimer() {
      const n = deck.length;
      timeLeft = document.getElementById('timed-check').checked
        ? Math.round(130 * 60 * (n / 65)) : 0;
      const el = document.getElementById('timer');
      if (!timeLeft) { el.textContent = ''; return; }
      el.textContent = formatTime(timeLeft);
      timerId = setInterval(() => {
        timeLeft--;
        el.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) { clearInterval(timerId); finishQuiz(); }
      }, 1000);
    }

    function getAnswer(q) {
      return answers[q.id];
    }

    function setAnswer(q, val) {
      answers[q.id] = val;
    }

    function renderQuestion() {
      const q = deck[index];
      const card = document.getElementById('question-card');
      const typeLabel = {single:'Single answer',multi:'Multi-select',ordering:'Ordering',matching:'Matching'}[q.type] || q.type;
      let body = '';
      if (q.type === 'ordering') {
        const order = getAnswer(q) || Object.keys(q.options);
        body = '<ol class="order-list" id="order-list">' + order.map((k, i) =>
          `<li class="order-item" data-key="${k}">

          </li>`).join('') + '</ol><p style="color:var(--muted);font-size:0.85rem">Use arrows to order steps correctly.</p>';
      } else if (q.type === 'matching') {
        const prompts = q.options.prompts;
        const choices = q.options.choices;
        const ans = getAnswer(q) || prompts.map(() => '');
        body = prompts.map((p, i) => `
          <div class="match-row">
            <label>${p}</label>
            <select class="match-sel" data-idx="${i}">
              <option value="">— Select —</option>
              ${choices.map(c => `<option value="${c}" ${ans[i]===c?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>`).join('');
      } else {
        const isMulti = q.type === 'multi';
        const sel = getAnswer(q) || (isMulti ? [] : null);
        const keys = Object.keys(q.options).sort();
        body = '<div class="options">' + keys.map(k => {
          const text = q.options[k];
          const selected = isMulti ? (sel||[]).includes(k) : sel === k;
          return `<label class="opt ${selected?'selected':''}" data-key="${k}">
            <input type="${isMulti?'checkbox':'radio'}" name="q${q.id}" value="${k}" ${selected?'checked':''} />
            <span><strong>${k})</strong> ${text}</span>
          </label>`;
        }).join('') + '</div>';
        if (isMulti) body += '<p style="color:var(--muted);font-size:0.85rem">Select all that apply.</p>';
      }

      card.innerHTML = `
        <div class="meta">
          <span class="badge">Q${index+1} / ${deck.length}</span>
          <span class="badge domain">${q.domain}</span>
          <span class="badge">${typeLabel}</span>
        </div>
        <div class="stem">${q.stem}</div>
        ${body}
        <div class="feedback" id="feedback"></div>
      `;

      bindInteractions(q);
      updateNav();
      document.getElementById('counter').textContent = `Question ${index+1} of ${deck.length}`;
      document.getElementById('progress-bar').style.width = `${((index+1)/deck.length)*100}%`;

      if (checked[q.id]) showFeedback(q, true);
    }

    function bindInteractions(q) {
      if (q.type === 'ordering') {
        const list = document.getElementById('order-list');
        list.querySelectorAll('.up-btn').forEach((btn, i) => btn.onclick = () => moveOrder(q, i, -1));
        list.querySelectorAll('.dn-btn').forEach((btn, i) => btn.onclick = () => moveOrder(q, i, 1));
        setAnswer(q, [...list.querySelectorAll('.order-item')].map(li => li.dataset.key));
      } else if (q.type === 'matching') {
        document.querySelectorAll('.match-sel').forEach(sel => {
          sel.onchange = () => {
            const vals = [...document.querySelectorAll('.match-sel')].map(s => s.value);
            setAnswer(q, vals);
          };
        });
      } else {
        document.querySelectorAll('.opt').forEach(label => {
          label.onclick = (e) => {
            if (checked[q.id] && !reviewMode) return;
            const key = label.dataset.key;
            const inp = label.querySelector('input');
            if (q.type === 'multi') {
              let arr = getAnswer(q) || [];
              if (inp.checked) arr = arr.filter(x => x !== key);
              else arr = [...arr, key];
              setAnswer(q, arr);
            } else {
              setAnswer(q, key);
            }
            renderQuestion();
          };
        });
      }
    }

    function moveOrder(q, i, dir) {
      const list = document.getElementById('order-list');
      const items = [...list.children];
      const j = i + dir;
      if (j < 0 || j >= items.length) return;
      if (dir < 0) list.insertBefore(items[i], items[j]);
      else list.insertBefore(items[j], items[i]);
      setAnswer(q, [...list.querySelectorAll('.order-item')].map(li => li.dataset.key));
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function isCorrect(q) {
      const a = getAnswer(q);
      if (q.type === 'ordering') return arraysEqual(a || [], q.correct);
      if (q.type === 'matching') return arraysEqual(a || [], q.correct);
      if (q.type === 'multi') {
        const s = [...(a||[])].sort().join(',');
        const c = [...q.correct].sort().join(',');
        return s === c;
      }
      return a === q.correct[0];
    }

    function showFeedback(q, noScroll) {
      const fb = document.getElementById('feedback');
      const ok = isCorrect(q);
      fb.className = 'feedback show ' + (ok ? 'ok' : 'bad');
      let html = `<h4>${ok ? '✓ Correct' : '✗ Incorrect'}</h4><p>${q.explanation || ''}</p>`;
      if (!ok) {
        html += `<p><strong>Correct:</strong> ${q.type==='ordering' ? q.correct.map(k=>q.options[k]).join(' → ') : q.type==='matching' ? q.correct.join(' | ') : q.correct.join(', ')}</p>`;
        if (q.wrongWhy && Object.keys(q.wrongWhy).length) {
          html += '<div class="wrong-why"><strong>Why others are wrong:</strong><ul>';
          for (const [k,v] of Object.entries(q.wrongWhy)) html += `<li>${k}: ${v}</li>`;
          html += '</ul></div>';
        }
      }
      fb.innerHTML = html;
      if (q.type !== 'ordering' && q.type !== 'matching') {
        document.querySelectorAll('.opt').forEach(label => {
          const key = label.dataset.key;
          label.classList.remove('selected');
          if (q.correct.includes(key)) label.classList.add('correct');
          else if ((q.type==='multi' ? (getAnswer(q)||[]).includes(key) : getAnswer(q)===key)) label.classList.add('incorrect');
        });
      }
    }

    function updateNav() {
      const q = deck[index];
      document.getElementById('prev-btn').disabled = index === 0;
      document.getElementById('check-btn').classList.toggle('hidden', !!checked[q.id]);
      document.getElementById('next-btn').classList.toggle('hidden', !checked[q.id] || index === deck.length - 1);
      document.getElementById('finish-btn').classList.toggle('hidden', !checked[q.id] || index !== deck.length - 1);
    }

    document.getElementById('check-btn').onclick = () => {
      const q = deck[index];
      if (q.type === 'matching') {
        const vals = [...document.querySelectorAll('.match-sel')].map(s => s.value);
        if (vals.some(v => !v)) { alert('Select an option for each row.'); return; }
        setAnswer(q, vals);
      }
      if (q.type === 'ordering') {
        const list = document.getElementById('order-list');
        setAnswer(q, [...list.querySelectorAll('.order-item')].map(li => li.dataset.key));
      }
      if (getAnswer(q) === undefined || getAnswer(q) === null || (Array.isArray(getAnswer(q)) && !getAnswer(q).length)) {
        alert('Please select an answer first.');
        return;
      }
      checked[q.id] = true;
      showFeedback(q);
      updateNav();
    };

    document.getElementById('next-btn').onclick = () => { index++; renderQuestion(); };
    document.getElementById('prev-btn').onclick = () => { index--; renderQuestion(); };
    document.getElementById('finish-btn').onclick = finishQuiz;

    function finishQuiz() {
      if (timerId) clearInterval(timerId);
      let correct = 0;
      deck.forEach(q => {
        if (!checked[q.id]) {
          const a = getAnswer(q);
          if (a === undefined || a === null || (Array.isArray(a) && !a.length)) {
            if (q.type === 'ordering') setAnswer(q, Object.keys(q.options));
            else if (q.type === 'matching') setAnswer(q, (q.options.prompts || []).map(() => ''));
          }
          checked[q.id] = true;
        }
        if (isCorrect(q)) correct++;
      });
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('header-tools').style.display = 'none';
      document.getElementById('results-screen').classList.remove('hidden');
      const pct = Math.round((correct / deck.length) * 100);
      document.getElementById('final-score').textContent = `${correct} / ${deck.length} (${pct}%)`;
      document.getElementById('final-detail').textContent = pct >= 85
        ? 'Strong readiness — consider scheduling the exam.'
        : pct >= 72
        ? 'Close — review incorrect answers and retest.'
        : 'Keep studying weak domains, then retake in timed mode.';
    }

    document.getElementById('start-btn').onclick = () => {
      deck = buildDeck();
      if (!deck.length) { alert('No questions in this filter.'); return; }
      index = 0;
      answers = {};
      checked = {};
      reviewMode = false;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('header-tools').style.display = 'flex';
      startTimer();
      renderQuestion();
    };

    document.getElementById('retry-btn').onclick = () => {
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    };

    document.getElementById('review-btn').onclick = () => {
      const wrong = deck.filter(q => !isCorrect(q));
      if (!wrong.length) { alert('No incorrect answers — great job!'); return; }
      deck = wrong;
      index = 0;
      answers = {};
      checked = {};
      reviewMode = true;
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      renderQuestion();
    };
  </script>
</body>
</html>
